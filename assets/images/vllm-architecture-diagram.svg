<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 1160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa1af" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="1160" fill="#ffffff" />

  <!-- Client -->
  <rect x="470" y="16" width="220" height="72" rx="16" fill="#f2ede1" stroke="#d8cfb8" stroke-width="1.5" />
  <text x="580" y="60" text-anchor="middle" font-size="22" font-weight="700" fill="#3a3226">Client</text>

  <!-- Client <-> vLLM arrows -->
  <line x1="545" y1="90" x2="545" y2="150" stroke="#9aa1af" stroke-width="2" marker-end="url(#arrow)" />
  <text x="500" y="124" text-anchor="middle" font-size="15" fill="#6b7280">request</text>

  <line x1="640" y1="150" x2="640" y2="90" stroke="#9aa1af" stroke-width="2" marker-end="url(#arrow)" />
  <text x="720" y="124" text-anchor="middle" font-size="15" fill="#6b7280">streamed tokens</text>

  <!-- vLLM engine outer box -->
  <rect x="40" y="160" width="1080" height="470" rx="26" fill="#d9f5e6" />
  <text x="76" y="210" font-size="25" font-weight="700" fill="#0d6b45">vLLM engine (host)</text>
  <text x="76" y="238" font-size="16" fill="#158a5a">Orchestrates and batches requests</text>

  <!-- Row 1: API server / Scheduler / Executor -->
  <g>
    <rect x="76" y="266" width="320" height="96" rx="14" fill="#ffffff" stroke="#8fd9b8" stroke-width="1.5" />
    <text x="236" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#0d6b45">API server</text>
    <text x="236" y="334" text-anchor="middle" font-size="15" fill="#2f8f65">Receives requests</text>

    <rect x="420" y="266" width="320" height="96" rx="14" fill="#ffffff" stroke="#8fd9b8" stroke-width="1.5" />
    <text x="580" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#0d6b45">Scheduler</text>
    <text x="580" y="334" text-anchor="middle" font-size="15" fill="#2f8f65">Orchestrates requests</text>

    <rect x="764" y="266" width="320" height="96" rx="14" fill="#ffffff" stroke="#8fd9b8" stroke-width="1.5" />
    <text x="924" y="308" text-anchor="middle" font-size="19" font-weight="700" fill="#0d6b45">Executor</text>
    <text x="924" y="334" text-anchor="middle" font-size="15" fill="#2f8f65">Sends batch to GPUs</text>
  </g>

  <!-- Row 2: Continuous batching / Chunked prefill (pills) -->
  <g>
    <rect x="140" y="394" width="330" height="64" rx="32" fill="#ffffff" stroke="#8fd9b8" stroke-width="1.5" />
    <text x="305" y="434" text-anchor="middle" font-size="19" font-weight="700" fill="#0d6b45">Continuous batching</text>

    <rect x="600" y="394" width="290" height="64" rx="32" fill="#ffffff" stroke="#8fd9b8" stroke-width="1.5" />
    <text x="745" y="434" text-anchor="middle" font-size="19" font-weight="700" fill="#0d6b45">Chunked prefill</text>
  </g>

  <!-- Row 3: PagedAttention / Prefix caching (pills) -->
  <g>
    <rect x="180" y="476" width="290" height="64" rx="32" fill="#ffffff" stroke="#8fd9b8" stroke-width="1.5" />
    <text x="325" y="516" text-anchor="middle" font-size="19" font-weight="700" fill="#0d6b45">PagedAttention</text>

    <rect x="590" y="476" width="270" height="64" rx="32" fill="#ffffff" stroke="#8fd9b8" stroke-width="1.5" />
    <text x="725" y="516" text-anchor="middle" font-size="19" font-weight="700" fill="#0d6b45">Prefix caching</text>
  </g>

  <!-- vLLM <-> GPU cluster arrows -->
  <line x1="505" y1="650" x2="505" y2="712" stroke="#9aa1af" stroke-width="2" marker-end="url(#arrow)" />
  <text x="430" y="686" text-anchor="middle" font-size="15" fill="#6b7280">dispatch batch</text>

  <line x1="630" y1="712" x2="630" y2="650" stroke="#9aa1af" stroke-width="2" marker-end="url(#arrow)" />
  <text x="750" y="686" text-anchor="middle" font-size="15" fill="#6b7280">next-token logits</text>

  <!-- GPU cluster outer box -->
  <rect x="40" y="722" width="1080" height="410" rx="26" fill="#fbe6da" />
  <text x="76" y="772" font-size="25" font-weight="700" fill="#8a3a12">GPU cluster</text>
  <text x="76" y="800" font-size="16" fill="#b0501c">Tensor-parallel, NVLink-linked</text>

  <!-- Row 1: GPU 0 / GPU 1 / GPU 2 -->
  <g>
    <rect x="76" y="828" width="320" height="96" rx="14" fill="#ffffff" stroke="#f0b892" stroke-width="1.5" />
    <text x="236" y="870" text-anchor="middle" font-size="19" font-weight="700" fill="#8a3a12">GPU 0</text>
    <text x="236" y="896" text-anchor="middle" font-size="15" fill="#b0501c">Model shard + KV</text>

    <line x1="396" y1="876" x2="420" y2="876" stroke="#e3a377" stroke-width="2" />

    <rect x="420" y="828" width="320" height="96" rx="14" fill="#ffffff" stroke="#f0b892" stroke-width="1.5" />
    <text x="580" y="870" text-anchor="middle" font-size="19" font-weight="700" fill="#8a3a12">GPU 1</text>
    <text x="580" y="896" text-anchor="middle" font-size="15" fill="#b0501c">Model shard + KV</text>

    <line x1="740" y1="876" x2="764" y2="876" stroke="#e3a377" stroke-width="2" />

    <rect x="764" y="828" width="320" height="96" rx="14" fill="#ffffff" stroke="#f0b892" stroke-width="1.5" />
    <text x="924" y="870" text-anchor="middle" font-size="19" font-weight="700" fill="#8a3a12">GPU 2</text>
    <text x="924" y="896" text-anchor="middle" font-size="15" fill="#b0501c">Model shard + KV</text>
  </g>

  <!-- Row 2: FlashAttention / Speculative decoding (pills) -->
  <g>
    <rect x="150" y="956" width="290" height="64" rx="32" fill="#ffffff" stroke="#f0b892" stroke-width="1.5" />
    <text x="295" y="996" text-anchor="middle" font-size="19" font-weight="700" fill="#8a3a12">FlashAttention</text>

    <rect x="560" y="956" width="340" height="64" rx="32" fill="#ffffff" stroke="#f0b892" stroke-width="1.5" />
    <text x="730" y="996" text-anchor="middle" font-size="19" font-weight="700" fill="#8a3a12">Speculative decoding</text>
  </g>

  <!-- Row 3: Quantization / MoE experts (pills) -->
  <g>
    <rect x="200" y="1038" width="260" height="64" rx="32" fill="#ffffff" stroke="#f0b892" stroke-width="1.5" />
    <text x="330" y="1078" text-anchor="middle" font-size="19" font-weight="700" fill="#8a3a12">Quantization</text>

    <rect x="610" y="1038" width="240" height="64" rx="32" fill="#ffffff" stroke="#f0b892" stroke-width="1.5" />
    <text x="730" y="1078" text-anchor="middle" font-size="19" font-weight="700" fill="#8a3a12">MoE experts</text>
  </g>
</svg>
